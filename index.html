<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1pick</title>

<style>
body{background:#000;color:#0f0;font-family:monospace;text-align:center}
#grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:300px;margin:20px auto}
.cell{padding:20px;border:1px solid #0f0;cursor:pointer;transition:.2s}
.mine{background:#0f0;color:#000}
</style>
</head>

<body>

<h1>1pick</h1>
<p>Pick 3 numbers. Avoid the crowd.</p>
<div id="timer">20</div>

<div id="grid"></div>

<button onclick="submit()">SUBMIT</button>

<script>

let TOTAL=15
let PICK=3

let selected=[]
let pop=new Array(TOTAL).fill(0)

let grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){
let d=document.createElement("div")
d.className="cell"
d.innerText=i

d.onclick=()=>{

if(navigator.vibrate) navigator.vibrate(15)

if(selected.includes(i)){
selected=selected.filter(x=>x!==i)
d.classList.remove("mine")
}else if(selected.length<PICK){
selected.push(i)
d.classList.add("mine")
}
}

grid.appendChild(d)
}

function simulate(){

pop=new Array(TOTAL).fill(0)

for(let p=0;p<100;p++){

let nums=[]

while(nums.length<PICK){
let n=Math.floor(Math.random()*TOTAL)
if(!nums.includes(n)) nums.push(n)
}

nums.forEach(x=>pop[x]++)
}

selected.forEach(x=>pop[x-1]++)
}

function playWinSound(){

let notes=["C4","E4","G4"]

notes.forEach((n,i)=>{

setTimeout(()=>{

let audio=new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/MusyngKite/acoustic_grand_piano-mp3/"+n+".mp3"
)

audio.play()

},i*200)

})

}

function submit(){

if(selected.length!=PICK){
alert("Pick 3 numbers")
return
}

alert("Submitted. You can still change.")

}

let time=20

setInterval(()=>{

time--

document.getElementById("timer").innerText="Next update in "+time

simulate()

if(time<=0){

let txt="You vs Crowd:\n\n"

selected.forEach(n=>{
txt+=n+" → "+pop[n-1]+" players\n"
})

playWinSound()

alert(txt)

time=20
}

},1000)

</script>

</body>
</html>
