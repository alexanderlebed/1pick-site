<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1pick</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
text-align:center;
}

h1{margin-top:20px;}

#subtitle{color:#9f9;}
#tagline{color:#7fffd4;}

#timer{font-size:40px;margin-top:10px;}

#players{color:#9f9;margin-top:5px;}

#score{
margin-top:5px;
color:#0ff;
}

#result{
margin-top:10px;
font-size:18px;
color:#7fffd4;
height:28px;
}

#jackpot{
margin-top:5px;
color:#ff0;
}

#grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
width:95vw;
max-width:520px;
margin:20px auto;
}

.number{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;

background:linear-gradient(#111,#000);
box-shadow:
0 4px 10px rgba(0,0,0,0.8),
inset 0 1px 2px rgba(255,255,255,0.1);

}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
box-shadow:0 0 14px #7fffd4,0 0 25px #00ffaa;
}

</style>
</head>

<body>

<h1>1pick</h1>

<div id="subtitle">Beat the crowd. Win real reward.</div>
<div id="tagline">Think different. Win.</div>

<div id="timer">20</div>
<div id="players"></div>
<div id="jackpot">🏆 Daily Prize: €10</div>
<div id="score">Your score: 0</div>
<div id="result"></div>

<div id="grid"></div>

<script>

const SUPABASE_URL = "https://uakvsitsifrsrkplvxma.supabase.co"
const SUPABASE_KEY = "sb_publishable_9h9b3CJknUUt-ucR5msSRg_4jRJ-QPb"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let TOTAL=49
let selected=null
let score=0

let popularity=new Array(TOTAL).fill(0)
let cells=[]
let lastRound=null

const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){

let cell=document.createElement("div")
cell.className="number cold"
cell.innerText=i.toString().padStart(2,"0")

cell.onclick=async ()=>{

selected=i
cells.forEach(c=>c.classList.remove("mine"))
cell.classList.add("mine")

await client.from("votes").insert({ number:i })

}

grid.appendChild(cell)
cells.push(cell)
}

/* load */

async function loadVotes(){

let since=new Date(Date.now()-20000).toISOString()

let { data } = await client
.from("votes")
.select("number,created_at")
.gte("created_at",since)

if(!data) return

popularity=new Array(TOTAL).fill(0)

data.forEach(v=>{
popularity[v.number-1]++
})

document.getElementById("players").innerText =
"Players online: "+data.length

heatmap()
}

/* heat */

function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v<=1) cell.classList.add("cold")
else if(v<=3) cell.classList.add("warm")
else if(v<=6) cell.classList.add("hot")
else cell.classList.add("extreme")

})
}

/* result + очки */

function showResult(){

if(selected==null) return

let my=popularity[selected-1]

let gain=0

if(my<=1) gain=10
else if(my<=3) gain=5
else if(my<=6) gain=2

score+=gain

document.getElementById("score").innerText =
"Your score: "+score

let txt=""

if(gain>=10){
txt="🔥 PERFECT — +10"
}
else if(gain>=5){
txt="👍 GOOD — +5"
}
else if(gain>0){
txt="🙂 +2"
}
else{
txt="😬 0"
}

document.getElementById("result").innerText=txt

}

/* timer */

setInterval(()=>{

let now=Date.now()
let roundTime=20000

let currentRound=Math.floor(now/roundTime)
let timeLeft=Math.ceil((roundTime-(now%roundTime))/1000)

document.getElementById("timer").innerText=timeLeft

if(lastRound!==null && currentRound!==lastRound){

showResult()

selected=null
cells.forEach(c=>c.classList.remove("mine"))

}

lastRound=currentRound

loadVotes()

},1000)

</script>

</body>
</html>
