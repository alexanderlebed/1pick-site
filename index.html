<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1pick</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
text-align:center;
}

h1{margin-top:20px;}

#timer{font-size:40px;margin-top:10px;}
#players{color:#9f9;margin-top:5px;}

#score{color:#0ff;margin-top:6px;}
#rank{color:#ff0;}
#streak{color:#f80;}

#leaderboard{
margin-top:15px;
font-size:14px;
color:#fff;
}

#result{
margin-top:10px;
font-size:20px;
color:#7fffd4;
height:26px;
}

#grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
width:95vw;
max-width:520px;
margin:20px auto;
}

.number{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
background:linear-gradient(#111,#000);
}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
box-shadow:0 0 14px #7fffd4,0 0 25px #00ffaa;
}

</style>
</head>

<body>

<h1>1pick</h1>

<div id="timer">20</div>
<div id="players"></div>

<div id="score">Points: 0</div>
<div id="rank">Rank: Beginner</div>
<div id="streak">Streak: 0</div>

<div id="leaderboard">Top today:<br>loading...</div>

<div id="result"></div>

<div id="grid"></div>

<script>

const SUPABASE_URL = "https://uakvsitsifrsrkplvxma.supabase.co"
const SUPABASE_KEY = "sb_publishable_9h9b3CJknUUt-ucR5msSRg_4jRJ-QPb"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* уникальный ID игрока */
let playerId = localStorage.getItem("player_id")
if(!playerId){
playerId = "P" + Math.floor(Math.random()*1000000)
localStorage.setItem("player_id", playerId)
}

let TOTAL=49
let selected=null
let score=0
let streak=0

let popularity=new Array(TOTAL).fill(0)
let cells=[]
let lastRound=null

const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){

let cell=document.createElement("div")
cell.className="number cold"
cell.innerText=i.toString().padStart(2,"0")

cell.onclick=async ()=>{

selected=i
cells.forEach(c=>c.classList.remove("mine"))
cell.classList.add("mine")

await client.from("votes").insert({ number:i })

}

grid.appendChild(cell)
cells.push(cell)
}

/* load votes */

async function loadVotes(){

let since=new Date(Date.now()-20000).toISOString()

let { data } = await client
.from("votes")
.select("number,created_at")
.gte("created_at",since)

if(!data) return

popularity=new Array(TOTAL).fill(0)

data.forEach(v=>{
popularity[v.number-1]++
})

document.getElementById("players").innerText =
"Players online: "+data.length

heatmap()
}

/* leaderboard save */

async function saveScore(){

await client.from("scores").upsert({
player:playerId,
points:score
})

}

/* leaderboard load */

async function loadLeaderboard(){

let { data } = await client
.from("scores")
.select("*")
.order("points",{ascending:false})
.limit(5)

if(!data) return

let html="Top today:<br>"

data.forEach((p,i)=>{
html+=(i+1)+". "+p.player+" — "+p.points+"<br>"
})

document.getElementById("leaderboard").innerHTML=html

}

/* heat */

function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v<=1) cell.classList.add("cold")
else if(v<=3) cell.classList.add("warm")
else if(v<=6) cell.classList.add("hot")
else cell.classList.add("extreme")

})
}

/* rank */

function getRank(p){
if(p<50) return "Beginner"
if(p<150) return "Thinker"
if(p<300) return "Strategist"
return "Master"
}

/* result */

function showResult(){

if(selected==null) return

let my=popularity[selected-1]

let gain=0

if(my<=1){gain=10;streak++}
else if(my<=3){gain=5;streak++}
else if(my<=6){gain=2;streak=0}
else{gain=0;streak=0}

score+=gain

document.getElementById("score").innerText="Points: "+score
document.getElementById("rank").innerText="Rank: "+getRank(score)
document.getElementById("streak").innerText="Streak: "+streak

saveScore()
loadLeaderboard()

let txt = gain>0 ? "+"+gain : "0"

let el=document.getElementById("result")
el.innerText=txt

setTimeout(()=>{el.innerText=""},2000)

}

/* timer */

setInterval(()=>{

let now=Date.now()
let roundTime=20000

let currentRound=Math.floor(now/roundTime)
let timeLeft=Math.ceil((roundTime-(now%roundTime))/1000)

document.getElementById("timer").innerText=timeLeft

if(lastRound!==null && currentRound!==lastRound){

showResult()

selected=null
cells.forEach(c=>c.classList.remove("mine"))

}

lastRound=currentRound

loadVotes()

},1000)

</script>

</body>
</html>
