<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1pick</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
text-align:center;
}

h1{margin-top:20px;}

#subtitle{color:#9f9;}
#tagline{color:#7fffd4;}

#timer{font-size:40px;margin-top:10px;}
#players{color:#9f9;margin-top:5px;}

#score{margin-top:6px;color:#0ff;font-size:18px;}
#rank{color:#ff0;margin-top:4px;}
#streak{color:#f80;margin-top:4px;}

#result{
margin-top:10px;
font-size:20px;
color:#7fffd4;
height:26px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
width:95vw;
max-width:320px;
margin:20px auto;
}

.number{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
background:#111;
}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
box-shadow:0 0 14px #7fffd4;
}

</style>
</head>

<body>

<h1>1pick</h1>

<div id="subtitle">Pick one number</div>
<div id="tagline">Avoid the crowd</div>

<div id="timer">20</div>
<div id="players"></div>
<div id="jackpot">Jackpot: 0</div>

<div id="score">Points: 0</div>
<div id="rank">Rank: Beginner</div>
<div id="streak">Streak: 0</div>

<div id="result"></div>

<div id="grid"></div>

<script>

const SUPABASE_URL = "https://uakvsitsifrsrkplvxma.supabase.co"
const SUPABASE_KEY = "sb_publishable_9h9b3CJknUUt-ucR5msSRg_4jRJ-QPb"

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

/* игрок */
let playerId = localStorage.getItem("player_id")
if(!playerId){
playerId = "P"+Math.floor(Math.random()*1000000)
localStorage.setItem("player_id", playerId)
}

let TOTAL=9
let selected=null

let score=0
let streak=0
let bestStreak=0

let popularity=new Array(TOTAL).fill(0)
let cells=[]
let lastRound=null

let jackpot = 0
let ticket = 1

function getRound(){
return Math.floor(Date.now()/20000)
}

const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){

let cell=document.createElement("div")
cell.className="number cold"
cell.innerText=i.toString().padStart(2,"0")

cell.onclick=async ()=>{

// 🔥 ВИБРАЦИЯ КЛИК
if(navigator.vibrate) navigator.vibrate(20)

selected=i
cells.forEach(c=>c.classList.remove("mine"))
cell.classList.add("mine")

let { error } = await client.from("votes").upsert(
{
  player: playerId,
  number: i,
  round: getRound()
},
{
  onConflict: "player"
})

}

grid.appendChild(cell)
cells.push(cell)
}

async function loadVotes(){

let { data } = await client
.from("votes")
.select("number,round")

if(!data) return

let currentRound = getRound()

popularity=new Array(TOTAL).fill(0)

let count = 0

data.forEach(v=>{
if(v.round === currentRound){
popularity[v.number-1]++
count++
}
})

document.getElementById("players").innerText =
"Players online: "+count

heatmap()
}

function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v<=1) cell.classList.add("cold")
else if(v<=3) cell.classList.add("warm")
else if(v<=6) cell.classList.add("hot")
else cell.classList.add("extreme")

})
}

/* 3% логика */
function getWinners(){

let total = popularity.reduce((a,b)=>a+b,0)
let limit = Math.floor(total * 0.03)

let arr = []

for(let i=0;i<TOTAL;i++){
arr.push({num:i+1, count:popularity[i]})
}

arr.sort((a,b)=>a.count-b.count)

let sum = 0
let winners = []

for(let x of arr){
if(sum + x.count > limit) break
sum += x.count
winners.push(x.num)
}

return winners
}

function getRank(points){

if(points<50) return "Beginner"
if(points<150) return "Thinker"
if(points<300) return "Strategist"
if(points<600) return "Master"
return "Oracle"

}

function showResult(){

if(selected==null) return

let total = popularity.reduce((a,b)=>a+b,0)
let bank = total * ticket

let winners = getWinners()

let gain=0
let text=""

if(winners.length===0){

jackpot += bank
text="💣 No winners → jackpot grows"

}else{

let pool = jackpot + bank
jackpot = 0

if(winners.includes(selected)){
gain = Math.floor(pool / winners.length)
text="🔥 WIN +" + gain
streak++
}else{
text="❌ Lost"
streak=0
}

}

score+=gain

if(streak>bestStreak) bestStreak=streak

document.getElementById("score").innerText="Points: "+score
document.getElementById("rank").innerText="Rank: "+getRank(score)
document.getElementById("streak").innerText="Streak: "+streak+" (best "+bestStreak+")"

document.getElementById("jackpot").innerText =
"Jackpot: " + jackpot

let el=document.getElementById("result")
el.innerText=text

// 🔥 ВИБРАЦИЯ КОНЕЦ РАУНДА
if(navigator.vibrate) navigator.vibrate([50,50,50])

setTimeout(()=>{ el.innerText="" },2000)

}

setInterval(()=>{

let now=Date.now()
let roundTime=20000

let currentRound=Math.floor(now/roundTime)
let timeLeft=Math.ceil((roundTime-(now%roundTime))/1000)

document.getElementById("timer").innerText=timeLeft

if(lastRound!==null && currentRound!==lastRound){

showResult()

selected=null
cells.forEach(c=>c.classList.remove("mine"))

}

lastRound=currentRound

loadVotes()

},1000)

</script>

</body>
</html>
