<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1pick</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
text-align:center;
}

h1{margin-top:20px;}

#subtitle{color:#9f9;}
#tagline{color:#7fffd4;}

#timer{font-size:40px;margin-top:10px;}
#players{color:#9f9;margin-top:5px;}

#result{
margin-top:10px;
font-size:20px;
color:#7fffd4;
height:26px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
width:95vw;
max-width:320px;
margin:20px auto;
}

.number{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:22px;
background:linear-gradient(#111,#000);
box-shadow:
0 4px 10px rgba(0,0,0,0.8),
inset 0 1px 2px rgba(255,255,255,0.1);
}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
box-shadow:0 0 14px #7fffd4,0 0 25px #00ffaa;
}

</style>
</head>

<body>

<h1>1pick</h1>

<div id="subtitle">You have ONE pick to beat the crowd</div>
<div id="tagline">Think different. Win.</div>

<div id="timer">30</div>
<div id="players">Players online: ...</div>

<div id="result"></div>

<div id="grid"></div>

<script>

const SUPABASE_URL = "https://uakvsitsifrsrkplvxma.supabase.co"
const SUPABASE_KEY = "sb_publishable_9h9b3CJknUUt-ucR5msSRg_4jRJ-QPb"

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let TOTAL=9
let selected=null
let cells=[]
let popularity=new Array(TOTAL).fill(0)

let roundTime = 30000
let lastRound = null

// уникальный игрок
let playerId = localStorage.getItem("player_id")
if(!playerId){
playerId = crypto.randomUUID()
localStorage.setItem("player_id", playerId)
}

// GRID
const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){

let cell=document.createElement("div")
cell.className="number cold"
cell.innerText=i

cell.onclick=async ()=>{

selected=i
cells.forEach(c=>c.classList.remove("mine"))
cell.classList.add("mine")

let round = Math.floor(Date.now()/roundTime)

await client.from("votes").insert({
number:i,
player:playerId,
round:round
})

}

grid.appendChild(cell)
cells.push(cell)
}

// LOAD
async function loadVotes(){

let round = Math.floor(Date.now()/roundTime)

let { data } = await client
.from("votes")
.select("number,player")
.eq("round",round)

if(!data) return

popularity=new Array(TOTAL).fill(0)

let uniquePlayers = new Set()

data.forEach(v=>{
popularity[v.number-1]++
uniquePlayers.add(v.player)
})

document.getElementById("players").innerText =
"Players online: "+uniquePlayers.size

heatmap()
}

// HEAT
function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v<=1) cell.classList.add("cold")
else if(v<=3) cell.classList.add("warm")
else if(v<=5) cell.classList.add("hot")
else cell.classList.add("extreme")

})
}

// RESULT (ТВОЙ АЛГОРИТМ)
function calculateWinners(){

let totalPlayers = popularity.reduce((a,b)=>a+b,0)
let limit = Math.floor(totalPlayers * 0.03)

let arr = popularity.map((v,i)=>({num:i+1,count:v}))
arr.sort((a,b)=>a.count-b.count)

let picked = 0
let winnersNumbers = []

for(let x of arr){

if(picked + x.count > limit) break

picked += x.count
winnersNumbers.push(x.num)

}

return winnersNumbers
}

// SHOW RESULT
function showResult(){

if(selected==null) return

let winners = calculateWinners()

let text=""

if(winners.length===0){
text="💣 Nobody won"
}
else if(winners.includes(selected)){
text="🔥 You WON"
}
else{
text="❌ Too popular"
}

let el=document.getElementById("result")
el.innerText=text

setTimeout(()=>{ el.innerText="" },2000)

}

// TIMER
setInterval(()=>{

let now=Date.now()
let currentRound=Math.floor(now/roundTime)
let timeLeft=Math.ceil((roundTime-(now%roundTime))/1000)

document.getElementById("timer").innerText=timeLeft

if(lastRound!==null && currentRound!==lastRound){

showResult()

selected=null
cells.forEach(c=>c.classList.remove("mine"))

}

lastRound=currentRound

loadVotes()

},1000)

</script>

</body>
</html>
