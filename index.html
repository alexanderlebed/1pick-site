<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1pick</title>

<style>
body{background:#000;color:#0f0;font-family:monospace;text-align:center}

/* grid */
#grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
width:300px;
margin:20px auto
}

.cell{
padding:20px;
border:1px solid #0f0;
cursor:pointer;
transition:.2s;
}

/* selection */
.mine{background:#0f0;color:#000}

/* heat */
.cold{color:#0f0}
.warm{color:#aa0}
.hot{color:#f50}
.extreme{color:#f00}

/* crowd bar */
#crowdbar{
height:16px;
width:300px;
margin:10px auto;
background:linear-gradient(to right,#00ff88,#88ff00,#ffff00,#ff8800,#ff0000);
border:1px solid #0f0;
}

#crowdlevel{
height:100%;
width:0%;
background:#000;
opacity:0.6;
transition:.3s;
}

#timer{
font-size:28px;
transition:.2s;
}

</style>
</head>

<body>

<h1>1pick</h1>
<p>Pick 3 numbers. Avoid the crowd.</p>

<div id="timer">20</div>

<div id="crowdbar">
<div id="crowdlevel"></div>
</div>

<div id="grid"></div>

<script>

let TOTAL=15
let PICK=3

let selected=[]
let pop=new Array(TOTAL).fill(0)

let grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){
let d=document.createElement("div")
d.className="cell cold"
d.innerText=i

d.onclick=()=>{

if(navigator.vibrate) navigator.vibrate(15)

if(selected.includes(i)){
selected=selected.filter(x=>x!==i)
d.classList.remove("mine")
}else if(selected.length<PICK){
selected.push(i)
d.classList.add("mine")
}
}

grid.appendChild(d)
}

/* simulate crowd */
function simulate(){

pop=new Array(TOTAL).fill(0)

for(let p=0;p<100;p++){

let nums=[]
while(nums.length<PICK){
let n=Math.floor(Math.random()*TOTAL)
if(!nums.includes(n)) nums.push(n)
}
nums.forEach(x=>pop[x]++)
}

selected.forEach(x=>pop[x-1]++)
}

/* heat + scale */
function heatmap(){

document.querySelectorAll(".cell").forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=pop[i]

if(v==0) cell.classList.add("cold")
else if(v<=2) cell.classList.add("warm")
else if(v<=4) cell.classList.add("hot")
else cell.classList.add("extreme")

/* scale pressure */
cell.style.transform = "scale("+(1 + v*0.03)+")"

})

}

/* crowd bar */
function updateCrowd(){

let sum=0
selected.forEach(n=>sum+=pop[n-1])

let crowd=Math.min(100,sum*5)
document.getElementById("crowdlevel").style.width=crowd+"%"

}

/* piano C E G */
function playWinSound(){

let notes=["C4","E4","G4"]

notes.forEach((n,i)=>{

setTimeout(()=>{

let audio=new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/MusyngKite/acoustic_grand_piano-mp3/"+n+".mp3"
)

audio.play()

},i*200)

})

}

let time=20

setInterval(()=>{

time--

let t = document.getElementById("timer")
t.innerText = "Next update in " + time

/* tension */
if(time <= 3){
t.style.color = "#f00"
t.style.transform = "scale(1.3)"
}else{
t.style.color = "#0f0"
t.style.transform = "scale(1)"
}

simulate()
heatmap()
updateCrowd()

if(time<=0){

playWinSound()

if(navigator.vibrate) navigator.vibrate([50,30,50])

time=20
}

},1000)

</script>

</body>
</html>
