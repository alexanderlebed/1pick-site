<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>1pick</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#cfc;
font-family:'Roboto Mono', monospace;
margin:0;
text-align:center;
}

h1{margin-top:20px;}

#subtitle{
color:#9f9;
margin-bottom:15px;
}

#layout{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

#lcd{
background:rgba(210,255,210,0.85);
padding:18px;
border-radius:18px;
color:#132;
width:420px;
box-shadow:0 0 30px rgba(0,255,150,0.3) inset;
}

#timer{font-size:40px;}

.metric{
font-size:18px;
margin-top:5px;
}

/* crowd */

#crowdbar{
height:16px;
background:linear-gradient(
to right,
#00ff88,
#88ff00,
#ffff00,
#ff8800,
#ff0000
);
border:1px solid #0a5;
margin-top:8px;
}

#crowdlevel{
height:100%;
width:0%;
background:#000;
opacity:0.6;
transition:0.3s;
}

/* grid */

#grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
width:95vw;
max-width:420px;
margin:20px auto;
}

.number{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border:2px solid transparent;
font-size:18px;

background:linear-gradient(#111,#000);
box-shadow:
0 2px 4px #000,
inset 0 1px 2px rgba(255,255,255,0.15);

transition:.2s;
}

.cold{color:#0f0;}
.warm{color:#aa0;}
.hot{color:#f50;}
.extreme{color:#f00;}

.mine{
border:2px solid #7fffd4;
}

</style>
</head>

<body>

<h1>1pick</h1>

<div id="subtitle">
Pick 3 numbers. Avoid the crowd.
</div>

<div id="layout">

<div>

<div id="lcd">

<div id="timer">20</div>

<div class="metric">PLAYERS 100</div>

<div style="margin-top:10px">
SAFE ← CROWD
<div id="crowdbar">
<div id="crowdlevel"></div>
</div>
</div>

</div>

<div id="grid"></div>

</div>

</div>

<script>

let TOTAL=15
let PICK=3
let time=20

let selected=[]
let popularity=new Array(TOTAL).fill(0)
let cells=[]

const grid=document.getElementById("grid")

for(let i=1;i<=TOTAL;i++){

let cell=document.createElement("div")

cell.className="number cold"
cell.innerText=i

cell.onclick=()=>{

if(navigator.vibrate) navigator.vibrate(15)

if(selected.includes(i)){
selected=selected.filter(x=>x!==i)
cell.classList.remove("mine")
}else if(selected.length<PICK){
selected.push(i)
cell.classList.add("mine")
}

}

grid.appendChild(cell)
cells.push(cell)

}

/* simulate crowd */
function simulate(){

popularity=new Array(TOTAL).fill(0)

for(let p=0;p<100;p++){

let nums=[]

while(nums.length<PICK){
let n=Math.floor(Math.random()*TOTAL)+1
if(!nums.includes(n)) nums.push(n)
}

nums.forEach(x=>popularity[x-1]++)

}

selected.forEach(x=>popularity[x-1]++)

}

/* heat */
function heatmap(){

cells.forEach((cell,i)=>{

cell.classList.remove("cold","warm","hot","extreme")

let v=popularity[i]

if(v==0) cell.classList.add("cold")
else if(v<=3) cell.classList.add("warm")
else if(v<=6) cell.classList.add("hot")
else cell.classList.add("extreme")

/* давление */
cell.style.transform="scale("+(1+v*0.02)+")"

})

}

/* crowd */
function updateCrowd(){

let sum=0
selected.forEach(n=>sum+=popularity[n-1])

let crowd=Math.min(100,sum*3)
document.getElementById("crowdlevel").style.width=crowd+"%"

}

/* звук */
function playWinSound(){

let notes=["C4","E4","G4"]

notes.forEach((n,i)=>{

setTimeout(()=>{

let audio=new Audio(
"https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@master/MusyngKite/acoustic_grand_piano-mp3/"+n+".mp3"
)

audio.play()

},i*200)

})

}

/* цикл */

setInterval(()=>{

time--

let t=document.getElementById("timer")
t.innerText="Next update in "+time

if(time<=3){
t.style.color="#f00"
t.style.transform="scale(1.2)"
}else{
t.style.color="#132"
t.style.transform="scale(1)"
}

simulate()
heatmap()
updateCrowd()

if(time<=0){

playWinSound()

if(navigator.vibrate) navigator.vibrate([50,30,50])

time=20
}

},1000)

</script>

</body>
</html>
